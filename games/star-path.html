<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Star Path — Quran Quest</title>
<link rel="stylesheet" href="../assets/css/shared.css" />
<style>
  body { background: #2b2350; overflow: hidden; }
  #wordPop {
    position: fixed; top: 16vh; left: 50%; transform: translateX(-50%);
    z-index: 30; pointer-events: none; text-align: center; opacity: 0;
  }
  #wordPop.show { animation: wp 1.6s ease forwards; }
  @keyframes wp {
    0% { opacity: 0; transform: translateX(-50%) scale(.5); }
    18% { opacity: 1; transform: translateX(-50%) scale(1.08); }
    30% { transform: translateX(-50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
  #wordPop .wp-ar {
    font-family: "Scheherazade New", serif; font-weight: 700; direction: rtl;
    font-size: clamp(44px, 9vw, 76px); color: #fff;
    text-shadow: 0 0 24px #fbbf24, 0 4px 14px rgba(0,0,0,.5);
  }
  #ayahBanner {
    position: fixed; inset: 0; z-index: 35; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: radial-gradient(ellipse at center, rgba(59,44,120,.88), rgba(30,22,64,.94));
    backdrop-filter: blur(4px); text-align: center; padding: 20px;
  }
  #ayahBanner.show { display: flex; animation: qq-appear .4s ease; }
  #ayahBanner .ab-ar {
    font-family: "Scheherazade New", serif; font-weight: 700; direction: rtl;
    font-size: clamp(34px, 7vw, 64px); color: #ffe9a8; line-height: 2;
    text-shadow: 0 0 30px rgba(251,191,36,.6); max-width: 90vw;
  }
  #ayahBanner .ab-glow { font-size: 54px; animation: qq-float 2.5s ease-in-out infinite; }
  #progress {
    position: fixed; top: 74px; left: 50%; transform: translateX(-50%);
    z-index: 40; display: flex; gap: 7px; background: rgba(255,255,255,.16);
    padding: 7px 14px; border-radius: 999px; backdrop-filter: blur(4px);
  }
  #progress .p-dot { width: 13px; height: 13px; border-radius: 50%; background: rgba(255,255,255,.35); transition: all .3s; }
  #progress .p-dot.done { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="wordPop"><div class="wp-ar"></div></div>
<div id="ayahBanner"><div class="ab-glow">✨</div><div class="ab-ar"></div></div>

<script src="../assets/js/surahs.js"></script>
<script src="../assets/js/voice-manifest.js"></script>
<script src="../assets/js/engine.js" data-audio-base="../audio/"></script>
<script>
(async function () {
  const surah = QQ.getSurah(QQ.param("surah"));
  if (!surah) { location.href = "../index.html"; return; }
  let level = Math.min(QQ.getLevel("starpath", surah.slug), 3);

  const cv = document.getElementById("cv");
  const c = QQ.fitCanvas(cv);
  const W = () => innerWidth, H = () => innerHeight;
  QQ.hud(surah, "Star Path");
  const keys = QQ.controls({ buttons: ["left", "up", "right"] });
  const wordPop = document.getElementById("wordPop");
  const banner = document.getElementById("ayahBanner");
  try { await document.fonts.load('700 48px "Scheherazade New"'); } catch (e) {}

  // ---------- level build ----------
  const SEG_GAP = 340;          // between stars
  let stars = [], gates = [], worldW = 0, verseHue = [];
  function perm(n, seed) {      // seeded Fisher-Yates permutation
    let s = (seed * 9301 + 49297) % 233280;
    const rnd = () => (s = (s * 9301 + 49297) % 233280) / 233280;
    const a = [...Array(n).keys()];
    for (let i = n - 1; i > 0; i--) { const j = Math.floor(rnd() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }
  function build() {
    stars = []; gates = [];
    let x = 700;
    surah.verses.forEach((v, vi) => {
      verseHue[vi] = 250 - vi * (190 / Math.max(1, surah.verses.length - 1)); // night → dawn
      const n = v.words.length;
      const px = perm(n, surah.id * 31 + vi * 7 + level);
      const py = perm(n, surah.id * 17 + vi * 13 + level * 3);
      v.words.forEach((w, wi) => {
        let sx = x + wi * SEG_GAP;
        let sy = H() * 0.5 + Math.sin(wi * 1.3 + vi) * H() * 0.16;
        if (level >= 2) { // scatter within the verse cluster; order must be remembered
          sx = x + px[wi] * SEG_GAP + (((wi * 13) % 3) - 1) * 60;
          sy = H() * (0.28 + (py[wi] / Math.max(1, n - 1)) * 0.42);
        }
        stars.push({ x: sx, y: sy, vi, wi, word: w, got: false, wob: 0, tw: Math.random() * 6 });
      });
      x += n * SEG_GAP + 120;
      gates.push({ x: x, vi, open: false, passed: false, glow: 0 });
      x += 420;
    });
    worldW = x + 600;
  }
  build();

  // progress dots (one per verse)
  const prog = document.createElement("div");
  prog.id = "progress";
  surah.verses.forEach(() => { const d = document.createElement("div"); d.className = "p-dot"; prog.appendChild(d); });
  document.body.appendChild(prog);
  const dots = [...prog.children];

  // ---------- state ----------
  const P = { x: 300, y: H() * 0.5, vx: 0, vy: 0, r: 26, trail: [] };
  let cam = 0, curVI = 0, curWI = 0, paused = true, t = 0, missTalk = 0;
  let sparks = [];

  function spark(x, y, col, n) {
    for (let i = 0; i < (n || 16); i++)
      sparks.push({ x, y, vx: (Math.random() - .5) * 7, vy: (Math.random() - .5) * 7 - 2, life: 1, col });
  }

  // ---------- game logic ----------
  async function collect(s) {
    s.got = true;
    QQ.sfx.pop();
    spark(s.x, s.y, "#fbbf24", 22);
    wordPop.querySelector(".wp-ar").textContent = s.word.ar;
    wordPop.classList.remove("show"); void wordPop.offsetWidth; wordPop.classList.add("show");
    QQ.playWord(s.word.audio);
    curWI++;
    const v = surah.verses[curVI];
    if (curWI >= v.words.length) {
      gates[curVI].open = true;
      QQ.sfx.ding();
    }
  }

  async function passGate(g) {
    g.passed = true;
    paused = true;
    QQ.stopAudio();
    const v = surah.verses[g.vi];
    dots[g.vi].classList.add("done");
    banner.querySelector(".ab-ar").textContent = v.ar;
    banner.classList.add("show");
    QQ.sfx.whoosh();
    await QQ.playVerse(surah.id, v.n);          // hear the whole ayah beautifully
    await QQ.speak(v.meaning);                   // then what it means
    banner.classList.remove("show");
    curVI++; curWI = 0;
    if (curVI >= surah.verses.length) {
      QQ.setLevel("starpath", surah.slug, level + 1);
      QQ.finish(surah, "starpath", level, () => location.reload());
    } else {
      QQ.preload(surah.id, surah.verses[curVI].n);
      QQ.preloadWords(surah.verses[curVI]);
      paused = false;
    }
  }

  // ---------- drawing ----------
  function star5(x, y, r, rot) {
    c.beginPath();
    for (let i = 0; i < 10; i++) {
      const rr = i % 2 ? r * .45 : r;
      const a = rot + (i * Math.PI) / 5 - Math.PI / 2;
      c[i ? "lineTo" : "moveTo"](x + Math.cos(a) * rr, y + Math.sin(a) * rr);
    }
    c.closePath();
  }
  function sky() {
    const hue = verseHue[Math.min(curVI, verseHue.length - 1)];
    const g = c.createLinearGradient(0, 0, 0, H());
    g.addColorStop(0, `hsl(${hue}, 48%, 26%)`);
    g.addColorStop(.62, `hsl(${hue + 22}, 55%, 48%)`);
    g.addColorStop(1, `hsl(${hue + 40}, 75%, 72%)`);
    c.fillStyle = g;
    c.fillRect(0, 0, W(), H());
    // twinkles
    c.fillStyle = "rgba(255,255,255,.7)";
    for (let i = 0; i < 40; i++) {
      const sx = ((i * 383 - cam * .2) % (W() + 60) + W() + 60) % (W() + 60) - 30;
      const sy = (i * 173) % (H() * .6);
      const s = 1 + Math.sin(t * .04 + i) * .8;
      c.globalAlpha = .3 + Math.abs(Math.sin(t * .03 + i * 2)) * .5;
      c.fillRect(sx, sy, s, s);
    }
    c.globalAlpha = 1;
    // parallax hills
    [[.45, .78, "rgba(30,22,64,.35)"], [.7, .87, "rgba(30,22,64,.5)"]].forEach(([spd, yy, col]) => {
      c.fillStyle = col;
      c.beginPath();
      c.moveTo(0, H());
      for (let x = 0; x <= W() + 20; x += 20) {
        const wx = x + cam * spd;
        c.lineTo(x, H() * yy + Math.sin(wx * .004) * 40 + Math.sin(wx * .011) * 16);
      }
      c.lineTo(W(), H());
      c.closePath(); c.fill();
    });
  }
  function drawGate(g) {
    const x = g.x - cam;
    if (x < -200 || x > W() + 200) return;
    const gy = H() * .82, gw = 130, gh = H() * .5;
    g.glow += ((g.open ? 1 : .25) - g.glow) * .08;
    c.save();
    c.shadowColor = `rgba(251,191,36,${g.glow})`;
    c.shadowBlur = 40 * g.glow;
    c.lineWidth = 16;
    c.strokeStyle = g.open ? "#ffe9a8" : "rgba(255,255,255,.4)";
    c.beginPath();
    c.moveTo(x - gw / 2, gy);
    c.lineTo(x - gw / 2, gy - gh * .6);
    c.quadraticCurveTo(x, gy - gh * 1.15, x + gw / 2, gy - gh * .6);
    c.lineTo(x + gw / 2, gy);
    c.stroke();
    if (g.open) {
      c.globalAlpha = .25 + Math.sin(t * .1) * .1;
      c.fillStyle = "#ffe9a8";
      c.fill();
      c.globalAlpha = 1;
    }
    c.restore();
  }
  function drawStar(s) {
    const x = s.x - cam;
    if (x < -80 || x > W() + 80 || s.got) return;
    const isNext = s.vi === curVI && s.wi === curWI;
    const locked = s.vi > curVI || (s.vi === curVI && s.wi > curWI);
    const bob = Math.sin(t * .05 + s.tw) * 8;
    const y = s.y + bob + (s.wob ? Math.sin(s.wob * 1.4) * s.wob : 0);
    if (s.wob > 0) s.wob -= .8;
    c.save();
    if (isNext) {
      // golden halo hint (levels 1-2)
      if (level < 3) {
        c.globalAlpha = .35 + Math.sin(t * .12) * .2;
        c.fillStyle = "#fbbf24";
        c.beginPath(); c.arc(x, y, 46 + Math.sin(t * .12) * 8, 0, 7); c.fill();
        c.globalAlpha = 1;
      }
      c.shadowColor = "#fbbf24"; c.shadowBlur = 30;
      c.fillStyle = "#ffd75e";
    } else {
      c.fillStyle = locked ? "rgba(255,255,255,.35)" : "#ffd75e";
    }
    star5(x, y, isNext ? 26 : 20, t * .01);
    c.fill();
    c.strokeStyle = "rgba(255,255,255,.8)"; c.lineWidth = 2; c.stroke();
    c.restore();
  }
  function drawPlayer() {
    const x = P.x - cam, y = P.y;
    P.trail.unshift({ x: P.x, y: P.y });
    if (P.trail.length > 14) P.trail.pop();
    P.trail.forEach((p, i) => {
      c.globalAlpha = (1 - i / 14) * .3;
      c.fillStyle = "#ffe9a8";
      c.beginPath(); c.arc(p.x - cam, p.y, P.r * (1 - i / 18), 0, 7); c.fill();
    });
    c.globalAlpha = 1;
    c.save();
    c.shadowColor = "#ffe9a8"; c.shadowBlur = 26;
    c.fillStyle = "#fff7dd";
    c.beginPath(); c.arc(x, y, P.r, 0, 7); c.fill();
    c.restore();
    // face
    c.fillStyle = "#2b2350";
    const lookX = keys.left ? -4 : 4;
    c.beginPath(); c.arc(x - 8 + lookX, y - 4, 3.4, 0, 7); c.fill();
    c.beginPath(); c.arc(x + 8 + lookX, y - 4, 3.4, 0, 7); c.fill();
    c.beginPath(); c.arc(x + lookX, y + 6, 5, 0, Math.PI); c.stroke();
    c.lineWidth = 2; c.strokeStyle = "#2b2350"; c.stroke();
    // tiny wings
    const fl = Math.sin(t * .3) * 6;
    c.fillStyle = "rgba(255,255,255,.75)";
    c.beginPath(); c.ellipse(x - P.r - 4, y + fl, 12, 7, -.5, 0, 7); c.fill();
    c.beginPath(); c.ellipse(x + P.r + 4, y + fl, 12, 7, .5, 0, 7); c.fill();
  }

  // ---------- loop ----------
  function loop() {
    t++;
    if (!paused) {
      const AX = .55, FR = .93, FLAP = .95, GRAV = .42;
      if (keys.left) P.vx -= AX;
      if (keys.right) P.vx += AX;
      if (keys.up) P.vy -= FLAP; else P.vy += GRAV;
      P.vx *= FR; P.vy *= .95;
      P.vy = Math.max(-9, Math.min(9, P.vy));
      P.x = Math.max(120, Math.min(worldW, P.x + P.vx));
      P.y = Math.max(70, Math.min(H() * .88, P.y + P.vy));
      cam += (P.x - W() * .38 - cam) * .08;
      cam = Math.max(0, Math.min(worldW - W(), cam));

      // star collisions
      for (const s of stars) {
        if (s.got) continue;
        const dx = s.x - P.x, dy = s.y - P.y;
        if (dx * dx + dy * dy < 48 * 48) {
          const isNext = s.vi === curVI && s.wi === curWI;
          if (isNext) collect(s);
          else if (s.wob <= 0) {
            s.wob = 10; QQ.sfx.hm();
            if (missTalk++ % 3 === 0) QQ.speak("Find the glowing star first!");
          }
        }
      }
      // gate collision
      const g = gates[curVI];
      if (g && g.open && !g.passed && Math.abs(g.x - P.x) < 40) passGate(g);
    }
    sky();
    gates.forEach(drawGate);
    stars.forEach(drawStar);
    drawPlayer();
    sparks = sparks.filter(p => p.life > 0);
    sparks.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += .15; p.life -= .03;
      c.globalAlpha = p.life; c.fillStyle = p.col;
      c.beginPath(); c.arc(p.x - cam, p.y, 4 * p.life, 0, 7); c.fill();
    });
    c.globalAlpha = 1;
    requestAnimationFrame(loop);
  }
  loop();

  QQ.startOverlay(
    "Star Path", "🌟",
    "Welcome to Star Path! Fly with the arrows, and catch the glowing word stars in order. " +
    "Each star sings one word of the surah. When you catch them all, fly through the golden gate!",
    async () => {
      QQ.preload(surah.id, surah.verses[0].n);
      QQ.preloadWords(surah.verses[0]);
      await QQ.speakIntro(surah);
      paused = false;
    }
  );
})();
</script>
</body>
</html>
